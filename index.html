<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cyber Secure Gateway</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: black;
    color: #00ffcc;
    font-family: 'Courier New', monospace;
    height: 100vh;
    overflow: hidden;
}

.screen {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    transition: opacity 0.8s ease;
}

.hidden {
    opacity: 0;
    pointer-events: none;
}

.visible {
    opacity: 1;
}

h1, h2, p {
    text-shadow: 0 0 15px #00ffcc;
}

.glitch {
    animation: glitch 0.3s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 0 red; }
    50% { text-shadow: -2px 0 blue; }
    100% { text-shadow: 2px 0 red; }
}

input {
    margin-top: 15px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    padding: 12px;
    width: 250px;
    text-align: center;
    font-size: 16px;
}

button {
    margin-top: 15px;
    padding: 10px 25px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #00ffcc;
    color: black;
}

#errorMsg {
    color: red;
    margin-top: 10px;
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
    <source src="https://image2url.com/r2/default/audio/1772369500808-09240cc7-3ec6-43c6-9a01-ecc2bd527ac2.mp3" type="audio/mp3">
</audio>

<!-- INTRO -->
<div id="intro" class="screen visible">
    <h1 class="glitch">MASUK</h1>
    <p id="typing"></p>
</div>

<!-- LOGIN -->
<div id="login" class="screen hidden">
    <h2>SECURE TERMINAL ACCESS</h2>
    <p>Enter Password</p>
    <input type="password" id="password" placeholder="••••••••">
    <button onclick="checkPassword()">ACCESS</button>
    <div id="errorMsg"></div>
</div>

<!-- SYSTEM -->
<div id="system" class="screen hidden">
    <h1>ACCESS GRANTED</h1>
    <p>Welcome, Zenzo.</p>
    <p>Firewall: Disabled</p>
    <p>Encryption Layer: Compromised</p>
    <p>>> Secure Channel Established</p>
</div>

<script>
const intro = document.getElementById("intro");
const login = document.getElementById("login");
const system = document.getElementById("system");
const music = document.getElementById("bgMusic");

const text = "Initializing encrypted connection...";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}

typeEffect();

// Play music when user interacts (browser restriction safe)
document.body.addEventListener("click", function() {
    music.play();
}, { once: true });

// Switch to login after intro
setTimeout(() => {
    intro.classList.remove("visible");
    intro.classList.add("hidden");
    login.classList.remove("hidden");
    login.classList.add("visible");
}, 4000);

function checkPassword() {
    const pass = document.getElementById("password").value;
    if (pass === "Zenzo") {
        login.classList.remove("visible");
        login.classList.add("hidden");
        system.classList.remove("hidden");
        system.classList.add("visible");
    } else {
        document.getElementById("errorMsg").innerHTML =
            "ACCESS DENIED — Unauthorized Intrusion Detected";
    }
}
</script>

</body>
</html>
